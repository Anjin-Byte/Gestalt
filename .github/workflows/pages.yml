name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Which app to deploy"
        required: true
        default: legacy
        type: choice
        options:
          - legacy
          - gestalt

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BASE_PATH: /${{ github.event.repository.name }}/
      # For push events, deploy legacy by default. For workflow_dispatch, use the input.
      DEPLOY_TARGET: ${{ github.event.inputs.target || 'legacy' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: pnpm install

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build WASM (legacy)
        if: env.DEPLOY_TARGET == 'legacy'
        run: pnpm build:wasm:legacy

      - name: Build legacy app
        if: env.DEPLOY_TARGET == 'legacy'
        run: pnpm build:legacy

      - name: Upload artifact (legacy)
        if: env.DEPLOY_TARGET == 'legacy'
        uses: actions/upload-pages-artifact@v4
        with:
          path: legacy/apps/web/dist

      - name: Build WASM (gestalt)
        if: env.DEPLOY_TARGET == 'gestalt'
        run: pnpm build:wasm

      - name: Build gestalt app
        if: env.DEPLOY_TARGET == 'gestalt'
        run: pnpm build

      - name: Upload artifact (gestalt)
        if: env.DEPLOY_TARGET == 'gestalt'
        uses: actions/upload-pages-artifact@v4
        with:
          path: apps/gestalt/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
