name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  phi-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install
        run: pnpm install

      - name: Run Phi unit tests
        run: pnpm -C packages/phi test

  rust-test-v2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Run v2 Rust tests (wasm_renderer)
        run: cargo test -p wasm_renderer
        working-directory: crates/wasm_renderer

  rust-test-legacy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Run legacy Rust tests (greedy_mesher)
        working-directory: legacy/crates/greedy_mesher
        run: cargo test

      - name: Run legacy Rust tests (voxelizer)
        working-directory: legacy/crates/voxelizer
        run: cargo test

  wasm-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install Playwright Chrome (for wasm-bindgen-test)
        run: npx --yes playwright install chromium --with-deps

      - name: Run wasm-bindgen tests
        run: wasm-pack test --headless --chrome legacy/crates/wasm_greedy_mesher

  playwright:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm -C apps/gestalt playwright install --with-deps

      - name: Run Playwright tests
        run: pnpm -C apps/gestalt test:e2e
