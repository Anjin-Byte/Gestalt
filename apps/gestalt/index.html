<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestalt</title>
    <link rel="icon" href="data:,">
    <!--
      coi-serviceworker injects COOP/COEP headers via service worker so that
      SharedArrayBuffer is available on hosts that can't set HTTP headers
      (e.g. GitHub Pages). In dev, Vite sets the headers directly.
      See: docs/architecture/wasm-boundary-protocol.md
    -->
    <script>
      if (window.location.hostname !== "localhost" && window.location.hostname !== "127.0.0.1") {
        const s = document.createElement("script");
        s.src = "/coi-serviceworker.js";
        document.head.appendChild(s);
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
